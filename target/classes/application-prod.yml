server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/game_community?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 200506

  data:  # 注意这里增加了 data 层级
    redis:
      host: localhost
      port: 6379
      password:      # 如果没有密码留空
      database: 0
      timeout: 5000ms  # 建议加上连接超时时间
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms # 建议加上最大等待时间
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yougame.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

jwt:
  secret: yougame-jwt-secret-key-2024-must-be-very-long-and-secure
  expiration: 86400000